<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #faf9fa;

        .font-sans { font-family: 'Inter', sans-serif; }

            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);

        .primary-gradient {

<body class="bg-surface text-on-background min-h-screen flex flex-col items-center justify-center p-6 sm:p-12">
<!-- Brand Identity Section (Top Center) -->
<header class="flex flex-col items-center gap-6 mb-12 animate-fade-in">
<div class="w-24 h-24 sm:w-32 sm:h-32 transition-transform duration-500 hover:scale-105">
<img alt="MIC College Logo" class="w-full h-full object-contain rounded-sm" src="https://lh3.googleusercontent.com/aida/AP1WRLtF5rw-Ywcjyav6sMhJa_pnZoSO39_crmkuaYNZ8Q2hISiNEI3QvDp59_MfkhkfrKhcGzoERc680B9xfyGPXUkWPJ3uoDJ0zPDe-et-cdzY-7ckBbY6DvraqyRm-6riNehr-hrTgXhdIGIYDuwzZ8MO84af7dw61qo1ZYzs6gijJJ932r0xmMQtWDyJ38iTWaJQ5u1KqEk_cYWJcikWiJCCHuqjTBi76OhqhzjMj8izS1VjxTWPrwWPwunC"/>
</div>
<div class="text-center space-y-2">
<h1 class="font-display text-3xl sm:text-4xl md:text-5xl font-bold text-primary tracking-tight">
                MIC Attendance & Remarks
            </h1>
<p class="font-label text-sm uppercase tracking-widest text-on-surface-variant font-medium">
                Discipline Incharge Login
            </p>
</div>
</header>
<!-- Login Card -->
<main class="w-full max-w-md">
<div class="glass-card p-8 sm:p-10 rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-outline-variant/15 transition-all duration-300">
<div class="hidden mb-6 p-4 rounded-lg bg-error-container text-on-error-container text-sm font-medium flex items-center gap-3 animate-shake" id="error-message">
<span class="material-symbols-outlined text-error">error</span>
                Invalid username or password. Please try again.
            </div>
<form class="space-y-6" id="login-form">
<!-- Username Field -->
<div class="space-y-2">
<label class="font-label text-xs font-semibold text-on-surface-variant uppercase tracking-wider ml-1" for="username">
                        Username
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">person</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-lowest border border-outline-variant/30 rounded-xl text-on-surface placeholder:text-outline transition-all duration-200" id="username" name="username" placeholder="Enter Username" required="" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="font-label text-xs font-semibold text-on-surface-variant uppercase tracking-wider ml-1" for="password">
                        Password
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full pl-12 pr-12 py-3.5 bg-surface-container-lowest border border-outline-variant/30 rounded-xl text-on-surface placeholder:text-outline transition-all duration-200" id="password" name="password" placeholder="Enter Password" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="pass-icon">visibility</span>
</button>
</div>
</div>
<!-- Login Action -->
<button class="w-full primary-gradient text-white font-label text-sm font-bold uppercase tracking-widest py-4 rounded-xl shadow-lg shadow-primary/20 hover:shadow-primary/40 hover:-translate-y-0.5 active:scale-95 transition-all duration-200 mt-4 flex items-center justify-center gap-2" type="submit">
                    Login
                    <span class="material-symbols-outlined text-lg">login</span>
</button>
</form>
<div class="mt-8 pt-8 border-t border-outline-variant/15 text-center">
<a class="font-label text-xs font-semibold text-primary hover:underline underline-offset-4 decoration-2 transition-all" href="#">
                    Forgot Credentials?
                </a>
</div>
</div>
<footer class="mt-12 text-center">
<p class="font-label text-[10px] text-outline uppercase tracking-widest">
                © 2024 Modern Institute College • Secure Access
            </p>
</footer>
</main>
<script>
        // Authentication Logic
        const loginForm = document.getElementById('login-form');
        const errorMessage = document.getElementById('error-message');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // Strict credentials check
            if (user === 'discipline incharge' && pass === 'incharge@123') {
                // Successful Login
                errorMessage.classList.add('hidden');
                
                // Add success visual feedback
                const btn = e.target.querySelector('button[type="submit"]');
                btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Validating...';
                btn.classList.replace('primary-gradient', 'bg-tertiary');
                
                setTimeout(() => {
                    // Redirect simulation (using common dashboard path for demo purposes)
                    window.location.href = '#dashboard';
                    alert('Success! Redirecting to Dashboard.');
                }, 800);
            } else {
                // Failed Login
                errorMessage.classList.remove('hidden');
                errorMessage.classList.add('animate-shake');
                
                // Reset shake animation for repeated failures
                setTimeout(() => {
                    errorMessage.classList.remove('animate-shake');
                }, 500);
            }
        });

        // UI Interactions
        function togglePassword() {
            const passInput = document.getElementById('password');
            const icon = document.getElementById('pass-icon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                passInput.type = 'password';
                icon.textContent = 'visibility';
            }
        }

        // Add tailwind custom animations via style
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-4px); }
                75% { transform: translateX(4px); }
            }
            .animate-shake {
                animation: shake 0.4s ease-in-out;
            }
            @keyframes fade-in {
                from { opacity: 0; transform: translateY(-10px); }
                to { opacity: 1; transform: translateY(0); }
            }
            .animate-fade-in {
                animation: fade-in 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            }
        `;
        document.head.appendChild(style);
    </script>
</body></html>
