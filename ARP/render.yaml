services:
  # Backend Express Web Service
  - type: web
    name: arp-backend
    env: node
    buildCommand: npm install
    startCommand: node server.js
    rootDir: Backend
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true

  # Frontend Vite Static Site
  - type: static
    name: arp-frontend
    env: static
    buildCommand: npm install && npm run build
    publishDir: dist
    rootDir: Frontend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: arp-backend
          type: web
          property: url
